<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABSOLUTE 문장구조</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--w:#f5f5f5;--red:#e63946;--gold:#f4a261;
  --g1:#161616;--g2:#222;--g3:#333;--g4:#666;--g5:#aaa;
  --s:#4cc9f0;--v:#f72585;--o:#f4a261;--c:#7bed9f;--io:#a29bfe;--do:#fd79a8;--oc:#fdcb6e;
}
body{background:var(--bg);color:var(--w);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:48px;}

/* ── SHARED ── */
.brand{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;}
.brand em{color:var(--red);font-style:normal;}
.tagline{font-size:10px;color:var(--g4);letter-spacing:1.5px;font-weight:300;margin-top:2px;}
.screen{display:none;}
.screen.on{display:block;}

/* ── HOME ── */
#home{padding:60px 24px 0;}
.home-header{text-align:center;margin-bottom:56px;}
.home-brand{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:8px;}
.home-brand em{color:var(--red);font-style:normal;}
.home-tag{font-size:11px;color:var(--g4);letter-spacing:2px;margin-top:6px;}
.mode-cards{display:flex;flex-direction:column;gap:14px;}
.mode-card{background:var(--g1);border:1px solid var(--g3);border-radius:20px;padding:28px 24px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.mode-card:active{background:var(--g2);}
.mode-card.primary{border-color:var(--red);}
.mode-accent{position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 20px 0 80px;opacity:.07;}
.mode-card.primary .mode-accent{background:var(--red);}
.mode-card.secondary .mode-accent{background:var(--g5);}
.mode-label{font-size:11px;letter-spacing:2px;color:var(--g4);margin-bottom:8px;font-weight:500;}
.mode-card.primary .mode-label{color:var(--red);}
.mode-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:6px;}
.mode-desc{font-size:12px;color:var(--g5);line-height:1.6;}
.mode-arrow{position:absolute;right:24px;bottom:28px;font-size:22px;color:var(--g3);}
.mode-card.primary .mode-arrow{color:var(--red);}

/* ── PRACTICE / TEST HEADER ── */
.top-bar{display:flex;align-items:center;gap:12px;padding:20px 20px 0;}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--g3);background:transparent;color:var(--w);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.top-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.top-score{margin-left:auto;font-size:12px;color:var(--g4);}

.form-tabs{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none;}
.form-tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:7px 16px;border-radius:20px;border:1px solid var(--g3);
  background:transparent;color:var(--g4);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:500;}

.prog-wrap{padding:12px 20px 0;}
.prog-top{display:flex;justify-content:space-between;font-size:11px;color:var(--g4);margin-bottom:5px;}
.prog-bar{height:2px;background:var(--g2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .4s;}

/* ── CARD ── */
.card-wrap{padding:14px 20px 0;}
.card{background:var(--g1);border:1px solid var(--g3);border-radius:18px;padding:20px;}
.card-meta{font-size:10px;color:var(--g4);letter-spacing:2px;margin-bottom:16px;}

/* sentence */
.sent-area{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:20px;}
.wb{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 4px;border-radius:10px;border:1.5px solid transparent;transition:background .15s,border-color .15s;}
.wb.sel{background:rgba(230,57,70,.12);border-color:rgba(230,57,70,.4);}
.wb.done-sel{background:rgba(100,100,100,.1);border-color:transparent;cursor:default;}
.wt{font-size:17px;line-height:1.3;}
.wl-wrap{height:22px;display:flex;align-items:center;}
.wl{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:4px;visibility:hidden;}
.wl.show{visibility:visible;}

/* role buttons */
.role-area{margin-bottom:18px;}
.role-hint{font-size:11px;color:var(--g4);margin-bottom:10px;min-height:16px;}
.role-hint.active{color:var(--w);}
.role-btns{display:flex;flex-wrap:wrap;gap:8px;}
.rb{padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:transform .1s;letter-spacing:.5px;}
.rb:active{transform:scale(.93);}
.rb.off{opacity:.2;pointer-events:none;}
.rb.erase{background:transparent!important;border:1px solid var(--g3);color:var(--g5)!important;font-weight:400;}

/* action */
.act-btns{display:flex;gap:10px;}
.btn-check{flex:1;padding:14px;background:var(--red);border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.btn-check:active{opacity:.75;}
.btn-next{flex:1;padding:14px;background:transparent;border:1px solid var(--g3);border-radius:12px;
  color:var(--w);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:none;}

/* feedback */
.fb{margin-top:16px;border-radius:14px;overflow:hidden;display:none;}
.fb-top{display:flex;align-items:center;gap:10px;padding:13px 16px;}
.fb-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.fb-msg{font-size:12px;line-height:1.6;flex:1;}
.ans-box{padding:14px 16px;background:var(--g2);border:1px solid var(--g3);border-top:none;border-radius:0 0 14px 14px;}
.ans-lbl{font-size:10px;color:var(--g4);letter-spacing:1px;margin-bottom:12px;}

/* answer sentence with underlines */
.ans-sent{display:flex;flex-wrap:wrap;gap:0;margin-bottom:12px;align-items:flex-end;}
.aw{display:inline-flex;flex-direction:column;align-items:center;gap:4px;margin-right:10px;margin-bottom:4px;}
.aw-text{font-size:15px;line-height:1.3;}
.aw-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px;}
.aw-spacer{height:18px;}

/* chunk underline group */
.chunk-group{display:inline-flex;align-items:flex-end;gap:0;position:relative;margin-right:10px;margin-bottom:4px;}
.chunk-group .aw{margin-right:6px;margin-bottom:0;}
.chunk-group .aw:last-child{margin-right:0;}
.chunk-underline{position:absolute;bottom:-6px;left:0;right:0;height:2px;border-radius:2px;}
.chunk-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
.chunk-wrap{position:relative;padding-bottom:24px;margin-right:10px;}

.tr-line{font-size:13px;color:var(--g5);line-height:1.7;padding-top:10px;border-top:1px solid var(--g3);}

/* ── RESULT ── */
#result{padding:24px 20px;}
.res-header{text-align:center;margin-bottom:28px;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:5px;}
.res-sub{font-size:11px;color:var(--g4);letter-spacing:1px;margin-top:4px;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.sc-card{background:var(--g1);border:1px solid var(--g3);border-radius:12px;padding:14px;}
.sc-lbl{font-size:10px;color:var(--g4);letter-spacing:1px;margin-bottom:6px;}
.sc-val{font-size:26px;font-weight:700;}
.good{color:#7bed9f;}.bad{color:var(--red);}
.weak-box{background:var(--g1);border:1px solid var(--red);border-radius:14px;padding:16px;margin-bottom:16px;}
.weak-ttl{font-size:11px;color:var(--red);letter-spacing:1.5px;font-weight:700;margin-bottom:14px;}
.vrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.vform{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--g2);border:1px solid var(--g3);color:var(--g5);letter-spacing:1px;flex-shrink:0;}
.vwords{font-size:12px;font-weight:500;margin-bottom:2px;}
.vdesc{font-size:11px;color:var(--g4);}
.flash-box{background:var(--g1);border:1px solid var(--g3);border-radius:14px;padding:16px;margin-bottom:20px;}
.flash-ttl{font-size:11px;color:var(--g4);letter-spacing:1px;margin-bottom:12px;}
.flashcard{background:var(--g2);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:1px solid var(--g3);}
.flashcard:active{background:var(--g3);}
.fw{font-size:19px;font-weight:700;line-height:1.4;}
.fhint{font-size:11px;color:var(--g4);}
.fans{font-size:13px;color:var(--gold);margin-top:4px;display:none;}
.fnav{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:12px;}
.fnav button{background:transparent;border:1px solid var(--g3);color:var(--w);padding:7px 18px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;}
.fnav span{font-size:11px;color:var(--g4);}
.btn-home{width:100%;padding:15px;background:var(--red);border:none;border-radius:12px;color:#fff;
  font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:10px;}
.btn-retry{width:100%;padding:15px;background:transparent;border:1px solid var(--g3);border-radius:12px;color:var(--w);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* test mode badge */
.form-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--g2);border:1px solid var(--g3);color:var(--g5);letter-spacing:1px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen on">
  <div class="home-header">
    <div class="home-brand">ABS<em>O</em>LUTE</div>
    <div class="home-tag">천천히 걸어도 목적지에 이를 거란 생각을 버려라</div>
  </div>
  <div class="mode-cards">
    <div class="mode-card primary" onclick="startPractice()">
      <div class="mode-accent"></div>
      <div class="mode-label">PRACTICE</div>
      <div class="mode-title">형식별 연습</div>
      <div class="mode-desc">1~5형식을 단계별로 연습합니다.<br>형식 탭을 선택해 원하는 형식부터 시작하세요.</div>
      <div class="mode-arrow">→</div>
    </div>
    <div class="mode-card secondary" onclick="startTest()">
      <div class="mode-accent"></div>
      <div class="mode-label">TEST</div>
      <div class="mode-title">실전 테스트</div>
      <div class="mode-desc">1~5형식 혼합 25문제.<br>형식별 5문제씩 무작위 출제됩니다.</div>
      <div class="mode-arrow">→</div>
    </div>
  </div>
</div>

<!-- PRACTICE -->
<div id="practice" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="top-title">연습</div>
    <div class="top-score" id="pScore"></div>
  </div>
  <div class="form-tabs" id="formTabs"></div>
  <div class="prog-wrap">
    <div class="prog-top"><span id="pProg"></span><span id="pFormScore"></span></div>
    <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
  </div>
  <div class="card-wrap">
    <div class="card">
      <div class="card-meta" id="pMeta"></div>
      <div class="sent-area" id="pSent"></div>
      <div class="role-area">
        <div class="role-hint" id="pHint">단어를 먼저 선택하세요</div>
        <div class="role-btns" id="pRoles"></div>
      </div>
      <div class="act-btns">
        <button class="btn-check" id="pCheck" onclick="practiceCheck()">확인</button>
        <button class="btn-next" id="pNext" onclick="practiceNext()">다음 →</button>
      </div>
      <div class="fb" id="pFb"></div>
    </div>
  </div>
</div>

<!-- TEST -->
<div id="test" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="top-title">실전 테스트</div>
    <div class="top-score" id="tScore"></div>
  </div>
  <div class="prog-wrap" style="padding-top:14px">
    <div class="prog-top"><span id="tProg"></span><span id="tPct"></span></div>
    <div class="prog-bar"><div class="prog-fill" id="tFill"></div></div>
  </div>
  <div class="card-wrap">
    <div class="card">
      <div class="card-meta" id="tMeta"></div>
      <div class="sent-area" id="tSent"></div>
      <div class="role-area">
        <div class="role-hint" id="tHint">단어를 먼저 선택하세요</div>
        <div class="role-btns" id="tRoles"></div>
      </div>
      <div class="act-btns">
        <button class="btn-check" id="tCheck" onclick="testCheck()">확인</button>
        <button class="btn-next" id="tNext" onclick="testNext()">다음 →</button>
      </div>
      <div class="fb" id="tFb"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res-header">
    <div class="home-brand" style="font-size:38px">ABS<em style="color:var(--red);font-style:normal">O</em>LUTE</div>
    <div class="res-title">결과</div>
    <div class="res-sub" id="resMode"></div>
  </div>
  <div id="resContent"></div>
</div>

<script>
/* ════════════════════════════════
   COLOR MAP
════════════════════════════════ */
const RC={S:"#4cc9f0",V:"#f72585",O:"#f4a261",C:"#7bed9f",IO:"#a29bfe",DO:"#fd79a8",OC:"#fdcb6e"};
const RT={S:"#000",V:"#fff",O:"#000",C:"#000",IO:"#000",DO:"#000",OC:"#000"};
/* strip trailing punctuation for key matching */
function clean(w){return w.replace(/[.,!?;:]+$/,"");}

/* ════════════════════════════════
   DATA
   ans  : word→role (for grading, key words only)
   chunks: [{words:[...], role, underline}] for answer display
   underline:true → draw underline bar for phrase/clause
════════════════════════════════ */
const DATA={
"1형식":{roles:["S","V"],qs:[
  {s:"There was a white house on the hill.",
   ans:{was:"V",house:"S"},
   chunks:[{words:["house"],role:"S"},{words:["was"],role:"V"}],
   tr:"언덕 위에 하얀 집이 있었다."},
  {s:"Suddenly there was a popping noise and a flash of light.",
   ans:{was:"V",noise:"S"},
   chunks:[{words:["noise"],role:"S"},{words:["was"],role:"V"}],
   tr:"갑자기 펑 하는 소리와 섬광이 있었다."},
  {s:"Is there any milk left?",
   ans:{Is:"V",milk:"S"},
   chunks:[{words:["milk"],role:"S"},{words:["Is"],role:"V"}],
   tr:"남은 우유가 있니?"},
  {s:"There used to be a pond around here.",
   ans:{used:"V",pond:"S"},
   chunks:[{words:["pond"],role:"S"},{words:["used"],role:"V"}],
   tr:"이 근처에 연못이 있었다."},
  {s:"There seem to be so many squirrels this year",
   ans:{seem:"V",squirrels:"S"},
   chunks:[{words:["squirrels"],role:"S"},{words:["seem"],role:"V"}],
   tr:"올해는 다람쥐가 매우 많은 것 같다."},
  {s:"There remain many questions for you to answer",
   ans:{remain:"V",questions:"S"},
   chunks:[{words:["questions"],role:"S"},{words:["remain"],role:"V"}],
   tr:"네가 답해야 할 질문들이 많이 남아있다."},
  {s:"How fast he walks!",
   ans:{he:"S",walks:"V"},
   chunks:[{words:["he"],role:"S"},{words:["walks"],role:"V"}],
   tr:"그는 얼마나 빠르게 걷는가!"},
  {s:"The door opened and people came out.",
   ans:{door:"S",opened:"V",people:"S",came:"V"},
   chunks:[{words:["door"],role:"S"},{words:["opened"],role:"V"},{words:["people"],role:"S"},{words:["came"],role:"V"}],
   tr:"문이 열리고 사람들이 나왔다."},
  {s:"An image appeared on the screen.",
   ans:{image:"S",appeared:"V"},
   chunks:[{words:["image"],role:"S"},{words:["appeared"],role:"V"}],
   tr:"화면에 이미지가 나타났다."},
  {s:"A face appeared at the window.",
   ans:{face:"S",appeared:"V"},
   chunks:[{words:["face"],role:"S"},{words:["appeared"],role:"V"}],
   tr:"창문에 얼굴이 나타났다."},
  {s:"The accident happened last night.",
   ans:{accident:"S",happened:"V"},
   chunks:[{words:["accident"],role:"S"},{words:["happened"],role:"V"}],
   tr:"사고가 어젯밤에 발생했다."},
  {s:"It rained a lot yesterday.",
   ans:{It:"S",rained:"V"},
   chunks:[{words:["It"],role:"S"},{words:["rained"],role:"V"}],
   tr:"어제 비가 많이 내렸다."},
  {s:"Light travels fastest of all",
   ans:{Light:"S",travels:"V"},
   chunks:[{words:["Light"],role:"S"},{words:["travels"],role:"V"}],
   tr:"빛은 모든 것 중에서 가장 빠르게 이동한다."},
  {s:"They went to New York yesterday.",
   ans:{They:"S",went:"V"},
   chunks:[{words:["They"],role:"S"},{words:["went"],role:"V"}],
   tr:"그들은 어제 뉴욕에 갔다."},
  {s:"Tom and I were walking along the beach.",
   ans:{Tom:"S",I:"S",were:"V",walking:"V"},
   chunks:[{words:["Tom","and","I"],role:"S",underline:true},{words:["were","walking"],role:"V",underline:true}],
   tr:"Tom과 나는 해변을 따라 걷고 있었다."},
  {s:"I went there to meet Mr. Watson.",
   ans:{I:"S",went:"V"},
   chunks:[{words:["I"],role:"S"},{words:["went"],role:"V"}],
   tr:"나는 왓슨 씨를 만나기 위해 그곳에 갔다."},
  {s:"He stopped at a shopping mall to buy his jacket",
   ans:{He:"S",stopped:"V"},
   chunks:[{words:["He"],role:"S"},{words:["stopped"],role:"V"}],
   tr:"그는 재킷을 사기 위해 쇼핑몰에 멈췄다."},
  {s:"The explosion occurred at 5:30 a.m.",
   ans:{explosion:"S",occurred:"V"},
   chunks:[{words:["explosion"],role:"S"},{words:["occurred"],role:"V"}],
   tr:"폭발은 오전 5시 30분에 발생했다."},
  {s:"Lower-priced homes are selling well these days.",
   ans:{homes:"S",are:"V",selling:"V"},
   chunks:[{words:["homes"],role:"S"},{words:["are","selling"],role:"V",underline:true}],
   tr:"요즘 저가 주택들이 잘 팔리고 있다."},
  {s:"Over six inches of snow fell last night.",
   ans:{snow:"S",fell:"V"},
   chunks:[{words:["snow"],role:"S"},{words:["fell"],role:"V"}],
   tr:"어젯밤에 6인치가 넘는 눈이 내렸다."},
  {s:"A warm breeze was blowing from the south.",
   ans:{breeze:"S",was:"V",blowing:"V"},
   chunks:[{words:["breeze"],role:"S"},{words:["was","blowing"],role:"V",underline:true}],
   tr:"따뜻한 미풍이 남쪽에서 불어오고 있었다."},
  {s:"The next Olympics will take place in Australia.",
   ans:{Olympics:"S",will:"V",take:"V"},
   chunks:[{words:["Olympics"],role:"S"},{words:["will","take"],role:"V",underline:true}],
   tr:"다음 올림픽은 호주에서 열릴 것이다."},
  {s:"The education system in Korea has changed a lot since Korean War.",
   ans:{system:"S",has:"V",changed:"V"},
   chunks:[{words:["system"],role:"S"},{words:["has","changed"],role:"V",underline:true}],
   tr:"한국의 교육 시스템은 한국전쟁 이후 많이 변했다."},
  {s:"Do ghosts really exist?",
   ans:{ghosts:"S",Do:"V",exist:"V"},
   chunks:[{words:["ghosts"],role:"S"},{words:["Do","exist"],role:"V",underline:true}],
   tr:"유령이 정말로 존재하는가?"}

/* ── BUILD ANSWER HTML ── */
function buildAnsHTML(q){
  const words=q.s.split(" ");
  // map word→chunk
  const chunkOf={};
  q.chunks.forEach((ch,ci)=>ch.words.forEach(w=>{chunkOf[w]=ci;}));
  // group words into segments: {type:"chunk",ci,words} or {type:"word",w}
  const segments=[];
  let i=0;
  while(i<words.length){
    const w=words[i];
    const ci=chunkOf[w];
    if(ci!==undefined){
      const ch=q.chunks[ci];
      if(ch.words.length>1 && ch.underline){
        segments.push({type:"chunk",ch,ci});
        i+=ch.words.length;
      } else {
        segments.push({type:"word",w,role:ch.role});
        i++;
      }
    } else {
      segments.push({type:"plain",w});
      i++;
    }
  }
  return segments.map(seg=>{
    if(seg.type==="word"){
      return `<div class="aw"><div class="aw-text">${seg.w}</div><div class="aw-tag" style="background:${RC[seg.role]};color:${RT[seg.role]}">${seg.role}</div></div>`;
    } else if(seg.type==="plain"){
      return `<div class="aw"><div class="aw-text">${seg.w}</div><div class="aw-spacer"></div></div>`;
    } else {
      // chunk with underline
      const ch=seg.ch;
      const inner=ch.words.map(w=>`<div class="aw" style="margin-right:4px"><div class="aw-text">${w}</div><div class="aw-spacer"></div></div>`).join("");
      return `<div class="chunk-wrap">
        <div class="chunk-group">${inner}</div>
        <div class="chunk-underline" style="background:${RC[ch.role]}"></div>
        <div class="chunk-label" style="color:${RC[ch.role]}">${ch.role}</div>
      </div>`;
    }
  }).join("");
}

/* ── SHARED RENDER ── */
function renderSent(containerId, words, uaMap, selW, isDone){
  document.getElementById(containerId).innerHTML=words.map((w,i)=>{
    const r=uaMap[clean(w)]||"";
    const isSel=selW&&selW.w===w&&selW.i===i;
    return `<div class="wb${isSel?" sel":isDone?" done-sel":""}" id="${containerId}_wb${i}" onclick="${containerId==="pSent"?"pSelW":"tSelW"}('${w.replace(/'/g,"\\'")}',${i})">
      <div class="wt">${w}</div>
      <div class="wl-wrap"><div class="wl${r?" show":""}" id="${containerId}_wl${i}" style="${r?`background:${RC[r]};color:${RT[r]}`:"background:transparent"}">${r||"·"}</div></div>
    </div>`;
  }).join("");
}

function renderRoleBtns(containerId, roles, selW, isDone){
  const off=!selW||isDone;
  document.getElementById(containerId).innerHTML=
    roles.map(r=>`<button class="rb${off?" off":""}" onclick="${containerId==="pRoles"?"pApply":"tApply"}('${r}')" style="background:${RC[r]};color:${RT[r]}">${r}</button>`).join("")+
    `<button class="rb erase${off?" off":""}" onclick="${containerId==="pRoles"?"pErase":"tErase"}()">지우기</button>`;
}

function showFb(fbId, correct, q, errList){
  const fb=document.getElementById(fbId);
  fb.style.display="block";
  const ansHTML=buildAnsHTML(q);
  if(correct){
    fb.innerHTML=`<div class="fb-top" style="background:rgba(123,237,159,.1);border:1px solid rgba(123,237,159,.25);border-radius:14px 14px 0 0">
      <div class="fb-icon" style="background:#7bed9f;color:#000">✓</div>
      <div class="fb-msg" style="color:#7bed9f;font-weight:700">정답!</div></div>
      <div class="ans-box"><div class="ans-lbl">문장 구조</div><div class="ans-sent">${ansHTML}</div><div class="tr-line">${q.tr}</div></div>`;
  } else {
    const errMsg=errList.map(x=>`<b style="color:var(--w)">${x.w}</b>: <span style="color:var(--red)">${x.given||"미선택"}</span>→<span style="font-weight:700;color:${RC[x.exp]}">${x.exp}</span>`).join(" · ");
    fb.innerHTML=`<div class="fb-top" style="background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.25);border-radius:14px 14px 0 0">
      <div class="fb-icon" style="background:var(--red);color:#fff">✗</div>
      <div class="fb-msg">${errMsg}</div></div>
      <div class="ans-box"><div class="ans-lbl">정답 구조</div><div class="ans-sent">${ansHTML}</div><div class="tr-line">${q.tr}</div></div>`;
  }
}

/* ════════ PRACTICE ════════ */
function startPractice(){mode="practice";cf=0;cq=0;sel=null;ua={};done=false;show("practice");renderTabs();renderPCard();}

function renderTabs(){
  document.getElementById("formTabs").innerHTML=forms.map((f,i)=>
    `<button class="tab${i===cf?" active":""}" onclick="pSwitchForm(${i})">${f}</button>`).join("");
}
function pSwitchForm(i){cf=i;cq=0;sel=null;ua={};done=false;renderTabs();renderPCard();}

function renderPCard(){
  done=false;sel=null;ua={};
  const f=forms[cf],qs=DATA[f].qs,q=qs[cq],n=qs.length;
  document.getElementById("pProg").textContent=`${cq+1} / ${n}`;
  document.getElementById("pFormScore").textContent=`${pSc[f]}점`;
  document.getElementById("pScore").textContent=`전체 ${forms.reduce((a,f)=>a+pSc[f],0)}점`;
  document.getElementById("pFill").style.width=`${(cq/n)*100}%`;
  document.getElementById("pMeta").textContent=`${f} · ${String(cq+1).padStart(2,"0")}`;
  const words=q.s.split(" ");
  renderSent("pSent",words,ua,sel,done);
  renderRoleBtns("pRoles",DATA[f].roles,sel,done);
  document.getElementById("pHint").textContent="단어를 먼저 선택하세요";
  document.getElementById("pHint").classList.remove("active");
  document.getElementById("pFb").style.display="none";
  document.getElementById("pFb").innerHTML="";
  document.getElementById("pCheck").style.display="block";
  document.getElementById("pNext").style.display="none";
}

function pSelW(w,i){
  if(done)return;
  sel={w,i};
  document.querySelectorAll("#pSent .wb").forEach(e=>e.classList.remove("sel"));
  document.getElementById("pSent_wb"+i).classList.add("sel");
  document.getElementById("pHint").textContent=`"${w}" 의 성분을 선택하세요`;
  document.getElementById("pHint").classList.add("active");
  renderRoleBtns("pRoles",DATA[forms[cf]].roles,sel,done);
}
function pApply(r){if(!sel||done)return;ua[clean(sel.w)]=r;const l=document.getElementById("pSent_wl"+sel.i);l.textContent=r;l.style.background=RC[r];l.style.color=RT[r];l.classList.add("show");}
function pErase(){if(!sel||done)return;delete ua[clean(sel.w)];const l=document.getElementById("pSent_wl"+sel.i);l.textContent="·";l.style.background="transparent";l.style.color="transparent";l.classList.remove("show");}

function practiceCheck(){
  const f=forms[cf],q=DATA[f].qs[cq];
  let wrong=[],ok=true;
  Object.entries(q.ans).forEach(([w,exp])=>{if((ua[w]||"")!==exp){wrong.push({w,exp,given:ua[w]||""});ok=false;}});
  done=true;pTot[f]++;
  if(ok)pSc[f]++;
  document.getElementById("pScore").textContent=`전체 ${forms.reduce((a,f)=>a+pSc[f],0)}점`;
  // mark wrong in sentence
  wrong.forEach(({w})=>{const words=q.s.split(" ");words.forEach((wd,i)=>{if(clean(wd)===w){const l=document.getElementById("pSent_wl"+i);l.style.background="#e63946";l.style.color="#fff";l.textContent=ua[w]||"?";l.classList.add("show");}});});
  showFb("pFb",ok,q,wrong);
  renderRoleBtns("pRoles",DATA[f].roles,sel,done);
  document.getElementById("pCheck").style.display="none";
  document.getElementById("pNext").style.display="block";
  const tot=DATA[f].qs.length;
  document.getElementById("pNext").textContent=cq>=tot-1?"결과 보기 →":"다음 →";
}
function practiceNext(){
  const f=forms[cf],tot=DATA[f].qs.length;
  if(cq>=tot-1){showPracticeResult();return;}
  cq++;renderPCard();
}
function showPracticeResult(){
  const weakF=forms.filter(f=>pTot[f]>0&&pSc[f]/pTot[f]<0.7);

}

function startTest(){
  mode="test";tIdx=0;tSc=0;tDone=false;tSel=null;tUa={};
  // pick 5 per form
  testQs=[];
  forms.forEach(f=>{
    const pool=TEST_POOL[f];
    const allQs=DATA[f].qs;
    const picked=shuffle(pool).slice(0,5);
    picked.forEach(s=>{
      const q=allQs.find(q=>q.s===s);
      if(q) testQs.push({...q,form:f});
    });
  });
  testQs=shuffle(testQs);
  show("test");renderTCard();
}

  renderRoleBtns("tRoles",ALL_ROLES,tSel,tDone);
}
function tApply(r){if(!tSel||tDone)return;tUa[clean(tSel.w)]=r;const l=document.getElementById("tSent_wl"+tSel.i);l.textContent=r;l.style.background=RC[r];l.style.color=RT[r];l.classList.add("show");}
function tErase(){if(!tSel||tDone)return;delete tUa[clean(tSel.w)];const l=document.getElementById("tSent_wl"+tSel.i);l.textContent="·";l.style.background="transparent";l.style.color="transparent";l.classList.remove("show");}

function testCheck(){
  const q=testQs[tIdx];
  let wrong=[],ok=true;
  Object.entries(q.ans).forEach(([w,exp])=>{if((tUa[w]||"")!==exp){wrong.push({w,exp,given:tUa[w]||""});ok=false;}});
  tDone=true;
  if(ok)tSc++;
  document.getElementById("tScore").textContent=`${tSc}점`;
  wrong.forEach(({w})=>{const words=q.s.split(" ");words.forEach((wd,i)=>{if(clean(wd)===w){const l=document.getElementById("tSent_wl"+i);l.style.background="#e63946";l.style.color="#fff";l.textContent=tUa[w]||"?";l.classList.add("show");}});});
  showFb("tFb",ok,q,wrong);
  renderRoleBtns("tRoles",ALL_ROLES,tSel,tDone);
  document.getElementById("tCheck").style.display="none";
  document.getElementById("tNext").style.display="block";
  document.getElementById("tNext").textContent=tIdx>=24?"결과 보기 →":"다음 →";
}
function testNext(){
  if(tIdx>=24){showTestResult();return;}
  tIdx++;renderTCard();
}
function showTestResult(){
  // per-form score
  const fSc={},fTot={};
  forms.forEach(f=>{fSc[f]=0;fTot[f]=0;});
  testQs.forEach((q,i)=>{/* can't recover per-q result here, approximate */});
  const weakF=[];
  showResult("실전 테스트 완료",{총점:tSc},{총점:25},weakF,()=>{startTest();},true);
}

/* ════════ RESULT ════════ */
let flashList=[],fi=0,fr=false;

function showResult(subtitle,scMap,totMap,weakF,retryCb,isTest=false){
  show("result");
  document.getElementById("resMode").textContent=subtitle;
  const aS=Object.values(scMap).reduce((a,v)=>a+v,0);
  const aT=Object.values(totMap).reduce((a,v)=>a+v,0);
  let verbs=[];
  weakF.forEach(f=>{if(WEAK[f])verbs.push(...WEAK[f].map(v=>({...v,form:f})));});
  if(!verbs.length&&!isTest) verbs=WEAK["4형식"].map(v=>({...v,form:"4형식"}));
  flashList=verbs;fi=0;fr=false;

  const scCards=Object.entries(scMap).filter(([f])=>totMap[f]>0).map(([f,s])=>`
    <div class="sc-card"><div class="sc-lbl">${f}</div><div class="sc-val ${s/totMap[f]>=.7?"good":"bad"}">${s}/${totMap[f]}</div></div>`).join("");

  document.getElementById("resContent").innerHTML=`
    <div class="sc-grid">
      <div class="sc-card"><div class="sc-lbl">총 정답</div><div class="sc-val ${aT&&aS/aT>=.7?"good":"bad"}">${aS}/${aT}</div></div>
      <div class="sc-card"><div class="sc-lbl">정답률</div><div class="sc-val ${aT&&aS/aT>=.7?"good":"bad"}">${aT?Math.round(aS/aT*100):0}%</div></div>
      ${scCards}
    </div>
    ${weakF.length?`
    <div class="weak-box">
      <div class="weak-ttl">약한 형식 — ${weakF.join(", ")}</div>
      ${verbs.map(v=>`<div class="vrow"><div class="vform">${v.form}</div><div><div class="vwords">${v.word}</div><div class="vdesc">${v.desc}</div></div></div>`).join("")}
    </div>`:""}
    ${verbs.length?`
    <div class="flash-box">
      <div class="flash-ttl">암기 플래시카드</div>
      <div class="flashcard" id="fcard" onclick="toggleF()">
        <div class="fw" id="fw">${verbs[0].word}</div>
        <div class="fhint" id="fhint">탭해서 확인</div>
        <div class="fans" id="fans">${verbs[0].desc}</div>
      </div>
      <div class="fnav">
        <button onclick="prevF()">← 이전</button>
        <span id="fcnt">1/${verbs.length}</span>
        <button onclick="nextF()">다음 →</button>
      </div>
    </div>`:""}
    <button class="btn-home" onclick="goHome()">홈으로</button>
    <button class="btn-retry" onclick="(${retryCb.toString()})()">다시 풀기</button>`;
}

function toggleF(){fr=!fr;document.getElementById("fans").style.display=fr?"block":"none";document.getElementById("fhint").style.display=fr?"none":"block";}
function prevF(){fi=Math.max(0,fi-1);uf();}
function nextF(){fi=Math.min(flashList.length-1,fi+1);uf();}
function uf(){fr=false;const v=flashList[fi];document.getElementById("fw").textContent=v.word;document.getElementById("fans").textContent=v.desc;document.getElementById("fans").style.display="none";document.getElementById("fhint").style.display="block";document.getElementById("fcnt").textContent=`${fi+1}/${flashList.length}`;}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
</script>
